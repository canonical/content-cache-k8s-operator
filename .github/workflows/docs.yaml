name: Documentation

on:
  push:
    branches: [ "main" ]
    paths:
      - 'README.md'
      - 'CONTRIBUTING.md'
  pull_request:
    paths:
      - 'README.md'
      - 'CONTRIBUTING.md'

jobs:
  docs-checks:
    uses: canonical/operator-workflows/.github/workflows/docs.yaml@main
    secrets: inherit
    with:
      linkcheck-fail-on-error: false
